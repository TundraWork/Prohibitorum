name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: ["master"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  MISE_EXPERIMENTAL: true

jobs:
  # The same gate developers run locally: `mise run ci` (Go vet/build/test +
  # frontend install/test/typecheck + embedded-dist freshness guard).
  gate:
    name: Gate (Go + frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v3 # installs the mise.lock-pinned toolchain (auto --locked)
      - run: mise run ci

  # End-to-end smoke against a real server + a podman-free local Postgres
  # (mise provides the prebuilt binaries; the smoke talks to the DB via pgx).
  smoke:
    name: End-to-end smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v3
      - run: mise run smoke
