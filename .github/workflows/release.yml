name: release

# Tag-driven release: GoReleaser + ko build the binaries + multi-arch OCI images
# (ghcr.io/tundrawork/prohibitorum), SBOMs, checksums, cosign signatures, and
# GitHub-native SLSA build-provenance attestations. See TOOLING.md §Prod.
on:
  push:
    tags: ["v*"]

# One in-flight release per tag; never cancel a partially-published release.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Least privilege: no ambient token scopes; the release job grants exactly what it needs.
permissions: {}

env:
  MISE_EXPERIMENTAL: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write      # create the GitHub Release
      packages: write      # push images to GHCR
      id-token: write      # cosign keyless signing + attestation OIDC
      attestations: write  # persist SLSA build provenance
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit # start in audit; flip to block once the endpoint allowlist is known
      - name: Checkout (full history for GoReleaser)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # GoReleaser needs full history + tags
      - name: Install toolchain (mise)
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3 — go/node/goreleaser/cosign/syft from mise.lock
        with:
          # zizmor cache-poisoning: this workflow publishes, so don't restore a
          # cached toolchain (mise.lock is already checksum-pinned, so no speed loss that matters).
          cache: false
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Release (GoReleaser + ko)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run prod:release
      - name: Attest build provenance (binaries + archives)
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-checksums: ./dist/checksums.txt
      - name: Resolve pushed image manifest digest
        id: image
        run: |
          # digests.txt is CSV (incompatible with attest's space-delimited
          # subject-checksums), so read the manifest-index digest from GoReleaser's
          # artifacts.json — this is what `oci://…:<tag>` resolves to.
          digest=$(jq -r 'first(.[] | select(.type=="Docker Manifest") | .path) | split("@")[1]' dist/artifacts.json)
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "Attesting ghcr.io/tundrawork/prohibitorum@$digest"
      - name: Attest build provenance (image)
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ghcr.io/tundrawork/prohibitorum
          subject-digest: ${{ steps.image.outputs.digest }}
