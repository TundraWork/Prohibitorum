version: "2"
sql:
  - engine: "postgresql"
    schema: "db/migrations"
    queries: "db/queries"
    gen:
      go:
        package: "db"
        out: "pkg/db"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_json_tags: true
        json_tags_case_style: "camel"
        overrides:
          - column: "account.id"
            go_type: "int32"
          - column: "webauthn_credential.id"
            go_type: "int32"
          - column: "webauthn_credential.account_id"
            go_type: "int32"
          - column: "webauthn_credential.user_handle"
            go_type:
              type: "[]byte"
          - column: "session.account_id"
            go_type: "int32"
          - column: "credential_event.account_id"
            go_type:
              type: "int32"
              pointer: true
          - column: "auth_throttle.account_id"
            go_type: "int32"
          - column: "password_credential.account_id"
            go_type: "int32"
          - column: "totp_credential.account_id"
            go_type: "int32"
          - column: "recovery_code.id"
            go_type: "int32"
          - column: "recovery_code.account_id"
            go_type: "int32"
          - column: "upstream_idp.id"
            go_type: "int64"
          - column: "account_identity.account_id"
            go_type: "int32"
          - column: "account_identity.upstream_idp_id"
            go_type: "int64"
          - column: "session.upstream_idp_id"
            go_type:
              type: "int64"
              pointer: true
          - column: "saml_sp.id"
            go_type: "int64"
          - column: "saml_sp_acs.sp_id"
            go_type: "int64"
          - column: "saml_sp_key.id"
            go_type: "int64"
          - column: "saml_sp_key.sp_id"
            go_type: "int64"
          - column: "saml_subject_id.account_id"
            go_type: "int32"
          - column: "saml_subject_id.sp_id"
            go_type: "int64"
          - column: "saml_session.id"
            go_type: "int64"
          - column: "saml_session.sp_id"
            go_type: "int64"
          - column: "saml_consent.account_id"
            go_type: "int32"
          - column: "saml_consent.sp_id"
            go_type: "int64"
          - column: "oidc_consent.account_id"
            go_type: "int32"
          - column: "account_avatar.idp_id"
            go_type:
              type: "int64"
              pointer: true
