version: "2"
sql:
  - engine: "postgresql"
    schema: "db/migrations"
    queries: "db/queries"
    gen:
      go:
        package: "db"
        out: "pkg/db"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_json_tags: true
        json_tags_case_style: "camel"
        overrides:
          - column: "account.id"
            go_type: "int32"
          - column: "webauthn_credential.id"
            go_type: "int32"
          - column: "webauthn_credential.account_id"
            go_type: "int32"
          - column: "webauthn_credential.user_handle"
            go_type:
              type: "[]byte"
          - column: "session.account_id"
            go_type: "int32"
          - column: "credential_event.account_id"
            go_type:
              type: "int32"
              pointer: true
          - column: "auth_throttle.account_id"
            go_type: "int32"
