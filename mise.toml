[tools]
go = "1.26"
node = "24"
sqlc = "1.30.0"
"aqua:pressly/goose" = "3.27.0"
# Postgres via PREBUILT binaries (theseus-rs), NOT mise's default source-building
# vfox-postgres backend — that one compiles from source and fails on macOS
# without pkg-config/ICU. The github backend downloads a pinned, per-platform
# binary (checksum + SLSA provenance verified by mise), so Postgres stays
# one-stop under `mise install`, reproducible, and cross-platform with no
# container runtime. `mise db:start` (scripts/dev-db.sh) runs a local dev/test
# cluster from these binaries (initdb/pg_ctl/postgres); compose.yaml remains an
# option for those who prefer a container. CI may set GITHUB_TOKEN to avoid the
# GitHub API rate limit on first install.
"github:theseus-rs/postgresql-binaries" = "18.3.0"
# Release tooling (used by `mise run release` and the release workflow):
# GoReleaser drives the build + multi-arch OCI images via its built-in ko
# integration + SBOMs; cosign signs the artifacts. See TOOLING.md.
"aqua:goreleaser/goreleaser" = "2.16.0"
"aqua:sigstore/cosign" = "3.1.1"

[settings]
# Pin exact tool versions + checksums + provenance in mise.lock (committed), so
# `mise install` is reproducible and hermetic — no live GitHub/registry API
# calls at install time (which also avoids the prebuilt-postgres rate limit).
lockfile = true

[env]
# mise is the single Go source of truth (no goenv). Forbid Go's transparent
# toolchain auto-download so it can't fetch a different compiler behind mise's
# back — `go.mod`'s `go 1.26` stays the language floor. See TOOLING.md.
GOTOOLCHAIN = "local"

[tasks.server]
description = "Run the Go server (serves the committed embedded SPA; no npm needed)."
# Build the whole package, not just main.go — addDevSeedCmd etc. live in
# sibling files (cmd/prohibitorum/dev_seed.go). `go run .../main.go` compiles
# only that one file and fails with "undefined: addDevSeedCmd".
run = "go run ./cmd/prohibitorum"

[tasks.web]
description = "Run the dashboard dev server (hot reload). Installs npm deps on first run."
run = """
set -e
cd dashboard
[ -d node_modules ] || npm ci
exec npm run dev
"""

[tasks.frontend-build]
description = "Install deps + build the dashboard SPA into pkg/webui/dist (vite outDir — this is the bundle the Go binary embeds)."
run = "cd dashboard && npm ci && npm run build"

[tasks.openapi]
description = "Regenerate openapi.yaml from the running humacli"
run = "go run ./cmd/prohibitorum openapi > openapi.yaml"

[tasks."db:up"]
description = "Apply DB migrations to the dev database (override by exporting PROHIBITORUM_DATABASE_URL)."
run = ". ./scripts/dev-env.sh && goose -dir db/migrations postgres \"$PROHIBITORUM_DATABASE_URL\" up"

[tasks."db:status"]
description = "Show migration status for the dev database (override by exporting PROHIBITORUM_DATABASE_URL)."
run = ". ./scripts/dev-env.sh && goose -dir db/migrations postgres \"$PROHIBITORUM_DATABASE_URL\" status"

[tasks."db:start"]
description = "Start a podman-free local Postgres for dev (self-contained cluster in .dev/pgdata; a drop-in for `podman compose up -d`, same port/role/db as scripts/dev-env.sh). The cross-platform default; Postgres binaries come from mise (no system install needed)."
run = "scripts/dev-db.sh start"

[tasks."db:stop"]
description = "Stop the local dev Postgres started by `mise db:start`."
run = "scripts/dev-db.sh stop"

[tasks."db:reset"]
description = "Stop and WIPE the local dev Postgres data dir (.dev/pgdata), so the next `mise db:start` is a fresh database."
run = "scripts/dev-db.sh reset"

[tasks.build]
description = "Build the SPA into pkg/webui/dist, then compile the ./prohibitorum binary (which embeds the dist). Run it directly, e.g. with the dev env: `. ./scripts/dev-env.sh && ./prohibitorum`."
run = """
set -e
cd dashboard
[ -d node_modules ] || npm ci
npm run build
cd ..
go build -o prohibitorum ./cmd/prohibitorum
echo "built ./prohibitorum"
"""

[tasks.dev-server]
description = "Build the SPA into pkg/webui/dist, then run the embedded server at http://localhost:8080 with dev defaults (see scripts/dev-env.sh): the prohibitorum_dev database (start it first with `podman compose up -d`, or `mise db:start` for a podman-free local cluster on macOS) and a stable .dev/encryption-key. The server auto-migrates on boot. Bootstrap an admin with `mise enroll-admin -- --new` in another shell."
run = """
set -e
. ./scripts/dev-env.sh
cd dashboard
[ -d node_modules ] || npm ci
npm run build
cd ..
exec go run ./cmd/prohibitorum
"""

[tasks.enroll-admin]
description = "Issue an admin passkey-enrollment URL against the dev database (same key/DB as dev-server), then open the printed http://localhost:8080/enroll/<token> in a browser. Default errors if an admin already exists; pass flags after --, e.g. `mise enroll-admin -- --new` or `mise enroll-admin -- --reset --username alice`."
run = """
set -e
. ./scripts/dev-env.sh
exec go run ./cmd/prohibitorum enroll-admin "$@"
"""

[tasks.dev-seed]
description = "Seed the dev database (prohibitorum_dev) with example providers/accounts/invitations so the dashboard's data-driven elements render. Idempotent, refuses non-localhost."
run = """
set -e
. ./scripts/dev-env.sh
exec go run ./cmd/prohibitorum dev-seed
"""

# ---- CI / release (run the same tasks locally and in GitHub Actions; see TOOLING.md) ----

[tasks."ci:go"]
description = "CI: Go vet + build (-tags nodynamic) + full test suite — the project's backend gate."
run = """
set -e
go vet ./...
go build -tags nodynamic ./...
go test ./...
"""

[tasks."ci:frontend"]
description = "CI: dashboard install + unit tests + typecheck (via build), then assert the committed pkg/webui/dist matches a fresh build (no stale-dist drift)."
run = """
set -e
cd dashboard
npm ci
npm test
npm run build
cd ..
if ! git diff --quiet -- pkg/webui/dist; then
  echo 'ERROR: pkg/webui/dist is stale — run `mise run build` and commit the rebuilt bundle.' >&2
  git --no-pager diff --stat -- pkg/webui/dist >&2
  exit 1
fi
"""

[tasks.ci]
description = "Run the full CI gate (Go + frontend) — the same task GitHub Actions runs."
depends = ["ci:go", "ci:frontend"]

[tasks.smoke]
description = "End-to-end smoke: start a local Postgres + the server and run cmd/smoke against it (expects exit 0). Used by the CI smoke job."
depends = ["db:start"]
run = """
set -e
export PROHIBITORUM_DATABASE_URL="postgres://prohibitorum@localhost:5432/postgres?sslmode=disable"
export PROHIBITORUM_DATA_ENCRYPTION_KEY_V1="$(openssl rand -base64 32)"
export PROHIBITORUM_PUBLIC_ORIGIN="http://localhost:8080"
export PROHIBITORUM_FEDERATION_ALLOW_PRIVATE_NETWORK="true"
# Build once and run the binary directly so the trap kills the real server
# (backgrounding `go run` leaves its compiled child orphaned, holding :8080).
BIN="$(mktemp -d)/prohibitorum"
go build -tags nodynamic -o "$BIN" ./cmd/prohibitorum
"$BIN" & SERVER_PID=$!
trap 'kill "$SERVER_PID" 2>/dev/null || true; rm -rf "$(dirname "$BIN")"' EXIT
for _ in $(seq 1 60); do
  curl -sf http://localhost:8080/.well-known/openid-configuration >/dev/null 2>&1 && break
  sleep 1
done
go run ./cmd/smoke --base-url http://localhost:8080
"""

[tasks.release]
description = "Build + publish a release: binaries + multi-arch OCI images (GoReleaser + ko) + SBOMs + checksums + cosign signatures. Runs on a git tag in the release workflow; dry-run locally with `goreleaser release --snapshot --clean`."
run = "goreleaser release --clean"
