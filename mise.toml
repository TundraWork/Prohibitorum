[tools]
go = "1.26"
node = "24"
sqlc = "1.30.0"
"aqua:pressly/goose" = "3.27.0"
# Postgres via PREBUILT binaries (theseus-rs), NOT mise's default source-building
# vfox-postgres backend — that one compiles from source and fails on macOS
# without pkg-config/ICU. The github backend downloads a pinned, per-platform
# binary (checksum + SLSA provenance verified by mise), so Postgres stays
# one-stop under `mise install`, reproducible, and cross-platform with no
# container runtime. `mise run db:start` (scripts/dev-db.sh) runs a local
# dev/test cluster from these binaries (initdb/pg_ctl/postgres); compose.yaml
# remains an option for those who prefer a container. CI may set GITHUB_TOKEN to
# avoid the GitHub API rate limit on first install.
"github:theseus-rs/postgresql-binaries" = "18.3.0"
# Release tooling (used by `mise run prod:release` and the release workflow):
# GoReleaser drives the build + multi-arch OCI images via its built-in ko
# integration + SBOMs; cosign signs the artifacts. See TOOLING.md.
"aqua:goreleaser/goreleaser" = "2.16.0"
"aqua:sigstore/cosign" = "3.1.1"

[settings]
# Pin exact tool versions + checksums + provenance in mise.lock (committed), so
# `mise install` is reproducible and hermetic — no live GitHub/registry API
# calls at install time (which also avoids the prebuilt-postgres rate limit).
lockfile = true

[env]
# mise is the single Go source of truth (no goenv). Forbid Go's transparent
# toolchain auto-download so it can't fetch a different compiler behind mise's
# back — `go.mod`'s `go 1.26` stays the language floor. See TOOLING.md.
GOTOOLCHAIN = "local"

# =============================================================================
# Tasks — namespaced by CONTEXT so dev and prod commands can't be mixed up.
# Run with `mise run <task>`, e.g. `mise run dev:server`. (`mise tasks` lists
# them grouped by namespace.) See TOOLING.md for the full picture.
#
#   dev:*    local development — run the app, hot reload, seed, enroll an admin
#   db:*     local Postgres lifecycle — used by dev + the smoke; never prod
#   build:*  build artifacts shared by dev and prod (the SPA bundle, openapi)
#   ci:*     the checks GitHub Actions runs (also runnable locally)
#   prod:*   PRODUCTION build + release (release binary, OCI images) — ship path
# =============================================================================

# ---- dev: local development -------------------------------------------------

[tasks."dev:server"]
description = "DEV: build the SPA + run the server at http://localhost:8080 with dev defaults (scripts/dev-env.sh: prohibitorum_dev DB + a stable .dev/encryption-key; auto-migrates on boot). Start the DB first with `mise run db:start`; bootstrap an admin with `mise run dev:enroll-admin -- --new`."
run = """
set -e
. ./scripts/dev-env.sh
cd dashboard
[ -d node_modules ] || npm ci
npm run build
cd ..
exec go run ./cmd/prohibitorum
"""

[tasks."dev:web"]
description = "DEV: dashboard dev server with hot reload (npm run dev), against a running backend (`mise run dev:server` or `mise run dev:run`). Installs npm deps on first run."
run = """
set -e
cd dashboard
[ -d node_modules ] || npm ci
exec npm run dev
"""

[tasks."dev:run"]
description = "DEV: run the Go server against your CURRENT env using the committed embedded SPA (no SPA rebuild, no npm). For the full dev experience use `mise run dev:server`."
# Build the whole package, not just main.go — addDevSeedCmd etc. live in
# sibling files (cmd/prohibitorum/dev_seed.go). `go run .../main.go` compiles
# only that one file and fails with "undefined: addDevSeedCmd".
run = "go run ./cmd/prohibitorum"

[tasks."dev:enroll-admin"]
description = "DEV: issue an admin passkey-enrollment URL against the dev DB (same key/DB as dev:server); open the printed http://localhost:8080/enroll/<token>. Errors if an admin exists; pass flags after --, e.g. `mise run dev:enroll-admin -- --new` or `... -- --reset --username alice`."
run = """
set -e
. ./scripts/dev-env.sh
exec go run ./cmd/prohibitorum enroll-admin "$@"
"""

[tasks."dev:seed"]
description = "DEV: seed the dev database with example providers/accounts/invitations so the dashboard's data-driven views render. Idempotent; refuses non-localhost."
run = """
set -e
. ./scripts/dev-env.sh
exec go run ./cmd/prohibitorum dev-seed
"""

# ---- db: local Postgres lifecycle (dev + smoke; never prod) -----------------

[tasks."db:start"]
description = "DB: start a local Postgres for dev/test (self-contained cluster in .dev/pgdata; same port/role/db as scripts/dev-env.sh). Binaries come from mise — no container runtime, no system install. A drop-in for `podman compose up -d`."
run = "scripts/dev-db.sh start"

[tasks."db:stop"]
description = "DB: stop the local Postgres started by `mise run db:start`."
run = "scripts/dev-db.sh stop"

[tasks."db:reset"]
description = "DB: stop and WIPE the local Postgres data dir (.dev/pgdata) for a fresh database."
run = "scripts/dev-db.sh reset"

[tasks."db:up"]
description = "DB: apply goose migrations to the dev database (override the target via PROHIBITORUM_DATABASE_URL)."
run = ". ./scripts/dev-env.sh && goose -dir db/migrations postgres \"$PROHIBITORUM_DATABASE_URL\" up"

[tasks."db:status"]
description = "DB: show goose migration status for the dev database (override via PROHIBITORUM_DATABASE_URL)."
run = ". ./scripts/dev-env.sh && goose -dir db/migrations postgres \"$PROHIBITORUM_DATABASE_URL\" status"

# ---- build: artifacts shared by dev and prod -------------------------------

[tasks."build:web"]
description = "BUILD: compile the dashboard SPA into pkg/webui/dist (vite outDir — the bundle the Go binary embeds via go:embed). Shared by dev:server, prod:build, and the release."
run = "cd dashboard && npm ci && npm run build"

[tasks."build:openapi"]
description = "BUILD: regenerate openapi.yaml from the running humacli."
run = "go run ./cmd/prohibitorum openapi > openapi.yaml"

# ---- ci: the checks GitHub Actions runs (also runnable locally) -------------

[tasks.ci]
description = "CI: the full fast gate (ci:go + ci:frontend) — the same task the CI `gate` job runs."
depends = ["ci:go", "ci:frontend"]

[tasks."ci:go"]
description = "CI: Go vet + build (-tags nodynamic) + full test suite — the backend gate."
run = """
set -e
go vet ./...
go build -tags nodynamic ./...
go test ./...
"""

[tasks."ci:frontend"]
description = "CI: dashboard install + unit tests + typecheck (via build), then assert the committed pkg/webui/dist matches a fresh build (no stale-dist drift)."
run = """
set -e
cd dashboard
npm ci
npm test
npm run build
cd ..
if ! git diff --quiet -- pkg/webui/dist; then
  echo 'ERROR: pkg/webui/dist is stale — run `mise run prod:build` (or `mise run build:web`) and commit the rebuilt bundle.' >&2
  git --no-pager diff --stat -- pkg/webui/dist >&2
  exit 1
fi
"""

[tasks."ci:smoke"]
description = "CI: end-to-end smoke — start a local Postgres + the server and run cmd/smoke against it (expects exit 0). The CI `smoke` job; also runnable locally."
depends = ["db:start"]
run = """
set -e
export PROHIBITORUM_DATABASE_URL="postgres://prohibitorum@localhost:5432/postgres?sslmode=disable"
export PROHIBITORUM_DATA_ENCRYPTION_KEY_V1="$(openssl rand -base64 32)"
export PROHIBITORUM_PUBLIC_ORIGIN="http://localhost:8080"
export PROHIBITORUM_FEDERATION_ALLOW_PRIVATE_NETWORK="true"
# Build once and run the binary directly so the trap kills the real server
# (backgrounding `go run` leaves its compiled child orphaned, holding :8080).
BIN="$(mktemp -d)/prohibitorum"
go build -tags nodynamic -o "$BIN" ./cmd/prohibitorum
"$BIN" & SERVER_PID=$!
trap 'kill "$SERVER_PID" 2>/dev/null || true; rm -rf "$(dirname "$BIN")"' EXIT
for _ in $(seq 1 60); do
  curl -sf http://localhost:8080/.well-known/openid-configuration >/dev/null 2>&1 && break
  sleep 1
done
go run ./cmd/smoke --base-url http://localhost:8080
"""

# ---- prod: production build + release (the ship path) -----------------------

[tasks."prod:build"]
description = "PROD: build the SPA + compile the ./prohibitorum release binary (-tags nodynamic, embeds the SPA), matching the released artifact. Run it with `. ./scripts/dev-env.sh && ./prohibitorum` or set PROHIBITORUM_* yourself."
run = """
set -e
cd dashboard
[ -d node_modules ] || npm ci
npm run build
cd ..
go build -tags nodynamic -o prohibitorum ./cmd/prohibitorum
echo "built ./prohibitorum"
"""

[tasks."prod:release"]
description = "PROD: build + publish a release — binaries + multi-arch OCI images (GoReleaser + ko) + SBOMs + checksums + cosign signatures. Runs on a git tag in the release workflow; dry-run locally with `goreleaser release --snapshot --clean`."
run = "goreleaser release --clean"
